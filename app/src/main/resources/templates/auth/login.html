<!DOCTYPE html>
<!--
  Login page.

  Spring Security's form login expects two request params named exactly
  "username" and "password", POSTed to /login. We keep those field names even
  though the username is an email.

  CSRF: Spring Security rejects any POST without a valid CSRF token. The hidden
  input below carries it — ${_csrf} is a request attribute Spring Security sets
  on every request. Without this field, login would fail with 403 Forbidden.

  Banners are driven by query params Spring Security adds on redirect:
  ?registered (from our signup), ?error (bad credentials), ?logout (signed out).
-->
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — toplms</title>
    <style>
        :root {
            --bg-from: #1e1b4b; --bg-to: #312e81;
            --accent: #818cf8; --accent-strong: #6366f1;
            --card: rgba(255,255,255,.06); --card-border: rgba(255,255,255,.12);
            --text: #f8fafc; --text-muted: #c7d2fe;
            --error: #fca5a5; --error-bg: rgba(252,165,165,.1);
            --ok: #6ee7b7; --ok-bg: rgba(110,231,183,.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 2rem;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
            background: radial-gradient(circle at 20% 20%, var(--bg-to), var(--bg-from));
        }
        .card {
            width: 100%; max-width: 420px;
            padding: 2.5rem 2.25rem;
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 24px 60px rgba(0,0,0,.35);
        }
        .back-link { display: inline-block; margin-bottom: 1.5rem; font-size: .82rem; color: var(--text-muted); text-decoration: none; }
        .back-link:hover { color: var(--accent); }
        h1 { font-size: 1.6rem; margin-bottom: .4rem; }
        .subtitle { color: var(--text-muted); margin-bottom: 1.5rem; font-size: .9rem; }
        .banner { padding: .7rem .9rem; border-radius: 8px; font-size: .85rem; margin-bottom: 1rem; }
        .banner.ok { color: var(--ok); background: var(--ok-bg); border: 1px solid rgba(110,231,183,.3); }
        .banner.err { color: var(--error); background: var(--error-bg); border: 1px solid rgba(252,165,165,.3); }
        label { display: block; margin-top: 1rem; margin-bottom: .3rem; font-size: .82rem; font-weight: 600; color: var(--text-muted); }
        input {
            width: 100%; padding: .65rem .85rem; font-size: .95rem; color: var(--text);
            background: rgba(255,255,255,.04); border: 1px solid var(--card-border);
            border-radius: 8px; outline: none; transition: border-color .15s ease;
        }
        input:focus { border-color: var(--accent); }
        button {
            width: 100%; margin-top: 1.5rem; padding: .8rem; font-size: .95rem; font-weight: 600;
            color: #fff; background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            border: none; border-radius: 10px; cursor: pointer; transition: transform .12s ease;
        }
        button:hover { transform: translateY(-1px); }
        .meta { margin-top: 1.25rem; text-align: center; font-size: .82rem; color: var(--text-muted); }
        .meta a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
<main class="card">
    <a class="back-link" th:href="@{/}">&larr; Back</a>
    <h1>Sign in</h1>
    <p class="subtitle">Access your workspace.</p>

    <div class="banner ok"  th:if="${param.registered}">Account created — sign in below.</div>
    <div class="banner err" th:if="${param.error}">Invalid email or password.</div>
    <div class="banner ok"  th:if="${param.logout}">You have been signed out.</div>

    <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <label for="username">Email</label>
        <input type="email" id="username" name="username" placeholder="jane@acme.com" autocomplete="email" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Your password" autocomplete="current-password" required>

        <button type="submit">Sign in</button>
    </form>

    <p class="meta">No workspace yet? <a th:href="@{/signup}">Create one</a></p>
</main>
</body>
</html>
