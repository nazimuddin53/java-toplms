<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${tenantName} + ' — New course'">Workspace — New course</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="layout">

    <div th:replace="~{tenant/fragments :: sidebar('courses')}"></div>

    <main class="content">
        <div class="page-head">
            <div>
                <h1>New course</h1>
                <p class="sub">Add a course to your workspace.</p>
            </div>
            <a class="btn btn-ghost" th:href="@{/app/admin/courses}">&larr; Back to courses</a>
        </div>

        <form class="form-card" th:action="@{/app/admin/courses}" th:object="${courseForm}" method="post" novalidate>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <label for="title">Title</label>
            <input type="text" id="title" th:field="*{title}" placeholder="Intro to Java">
            <span class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">err</span>

            <label for="description">Description</label>
            <input type="text" id="description" th:field="*{description}" placeholder="What this course covers">
            <span class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}">err</span>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Create course</button>
                <a class="btn btn-ghost" th:href="@{/app/admin/courses}">Cancel</a>
            </div>
        </form>
    </main>

</div>
</body>
</html>
