<!DOCTYPE html>
<!-- Create-user form. Posts to /app/admin/users (handled by AdminUserController).
     The role <select> is populated from the tenant's roles; th:errors render the
     per-field validation messages on re-display. -->
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${tenantName} + ' — New user'">Workspace — New user</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="layout">

    <div th:replace="~{tenant/fragments :: sidebar('users')}"></div>

    <main class="content">
        <div class="page-head">
            <div>
                <h1>New user</h1>
                <p class="sub">Add a team member to your workspace.</p>
            </div>
            <a class="btn btn-ghost" th:href="@{/app/admin/users}">&larr; Back to users</a>
        </div>

        <form class="form-card" th:action="@{/app/admin/users}" th:object="${createUserForm}" method="post" novalidate>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <label for="fullName">Full name</label>
            <input type="text" id="fullName" th:field="*{fullName}" placeholder="John Smith">
            <span class="error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}">err</span>

            <label for="email">Email</label>
            <input type="email" id="email" th:field="*{email}" placeholder="john@acme.com" autocomplete="off">
            <span class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">err</span>

            <label for="password">Temporary password</label>
            <input type="password" id="password" th:field="*{password}" placeholder="At least 8 characters" autocomplete="new-password">
            <span class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">err</span>

            <label for="roleId">Role</label>
            <select id="roleId" th:field="*{roleId}">
                <option value="">Select a role…</option>
                <option th:each="r : ${roles}" th:value="${r.id}" th:text="${r.roleName}">ADMIN</option>
            </select>
            <span class="error" th:if="${#fields.hasErrors('roleId')}" th:errors="*{roleId}">err</span>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Create user</button>
                <a class="btn btn-ghost" th:href="@{/app/admin/users}">Cancel</a>
            </div>
        </form>
    </main>

</div>
</body>
</html>
