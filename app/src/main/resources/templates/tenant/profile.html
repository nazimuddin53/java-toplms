<!DOCTYPE html>
<!--
  Tenant profile (the page a tenant admin lands on after login).

  All values come from the authenticated principal via the controller's Model.
  Logout is a POST form (not a link) because Spring Security's logout is a
  state-changing action and is CSRF-protected — hence the hidden token field.
-->
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${tenantName} + ' — Profile'">Workspace — Profile</title>
    <style>
        :root {
            --bg-from: #1e1b4b; --bg-to: #312e81;
            --accent: #818cf8; --accent-strong: #6366f1;
            --card: rgba(255,255,255,.06); --card-border: rgba(255,255,255,.12);
            --text: #f8fafc; --text-muted: #c7d2fe;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 2rem;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
            background: radial-gradient(circle at 20% 20%, var(--bg-to), var(--bg-from));
        }
        .card {
            width: 100%; max-width: 520px;
            padding: 2.75rem 2.5rem;
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 24px 60px rgba(0,0,0,.35);
        }
        .top { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.75rem; }
        .logo {
            width: 56px; height: 56px; flex: none;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: 800; color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            border-radius: 14px; box-shadow: 0 8px 24px rgba(99,102,241,.5);
        }
        h1 { font-size: 1.45rem; line-height: 1.2; }
        .role { font-size: .78rem; color: var(--text-muted); margin-top: .15rem; }
        .rows { border-top: 1px solid var(--card-border); }
        .row {
            display: flex; justify-content: space-between; align-items: center; gap: 1rem;
            padding: .9rem 0; border-bottom: 1px solid var(--card-border);
            font-size: .92rem;
        }
        .row .k { color: var(--text-muted); }
        .row .v { text-align: right; }
        code {
            font-family: ui-monospace, "JetBrains Mono", monospace;
            color: var(--accent);
            background: rgba(0,0,0,.25); padding: .15rem .5rem; border-radius: 6px;
        }
        form { margin-top: 1.75rem; }
        button {
            width: 100%; padding: .75rem; font-size: .92rem; font-weight: 600;
            color: var(--text);
            background: rgba(255,255,255,.05); border: 1px solid var(--card-border);
            border-radius: 10px; cursor: pointer; transition: background .15s ease;
        }
        button:hover { background: rgba(255,255,255,.1); }
    </style>
</head>
<body>
<main class="card">
    <div class="top">
        <div class="logo" th:text="${#strings.toUpperCase(#strings.substring(tenantName, 0, 1))}">A</div>
        <div>
            <h1 th:text="${tenantName}">Acme Learning</h1>
            <div class="role">Tenant admin workspace</div>
        </div>
    </div>

    <div class="rows">
        <div class="row">
            <span class="k">Workspace URL</span>
            <span class="v"><code>toplms.app/<span th:text="${slug}">acme</span></code></span>
        </div>
        <div class="row">
            <span class="k">Signed in as</span>
            <span class="v" th:text="${fullName}">Jane Doe</span>
        </div>
        <div class="row">
            <span class="k">Email</span>
            <span class="v" th:text="${email}">jane@acme.com</span>
        </div>
        <div class="row">
            <span class="k">Role</span>
            <span class="v" th:text="${roleName} ?: '—'">ADMIN</span>
        </div>
    </div>

    <!-- Only admins see the dashboard link. th:if removes the element entirely
         when false — and SecurityConfig still blocks /app/admin server-side, so
         this is convenience, not the actual access control. -->
    <a th:if="${isAdmin}" th:href="@{/app/admin}"
       style="display:block; margin-top:1.5rem; text-align:center; padding:.75rem;
              color:#fff; text-decoration:none; border-radius:10px;
              background:linear-gradient(135deg,var(--accent),var(--accent-strong));
              font-weight:600;">
        Go to admin dashboard
    </a>

    <form th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit">Sign out</button>
    </form>
</main>
</body>
</html>
