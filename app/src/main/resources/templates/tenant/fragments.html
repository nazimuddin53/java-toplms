<!DOCTYPE html>
<!--
  Reusable Thymeleaf fragments for the admin area.

  th:replace="~{tenant/fragments :: sidebar('courses')}" pulls the sidebar in;
  the argument becomes `active` and highlights the matching nav item. Pages that
  compute the active key at runtime pass it as a variable, e.g. sidebar(${active}).
-->
<html xmlns:th="http://www.thymeleaf.org">
<body>

<aside th:fragment="sidebar(active)" class="sidebar">
    <a class="brand" th:href="@{/app/admin}">
        <span class="mark" th:text="${#strings.toUpperCase(#strings.substring(tenantName, 0, 1))}">A</span>
        <span th:text="${tenantName}">Acme</span>
    </a>

    <nav>
        <a class="nav-item" th:href="@{/app/admin}"
           th:classappend="${active == 'dashboard'} ? 'active' : ''">Dashboard</a>
        <a class="nav-item" th:href="@{/app/admin/courses}"
           th:classappend="${active == 'courses'} ? 'active' : ''">Courses</a>
        <a class="nav-item" th:href="@{/app/admin/teachers}"
           th:classappend="${active == 'teachers'} ? 'active' : ''">Teachers</a>
        <a class="nav-item" th:href="@{/app/admin/students}"
           th:classappend="${active == 'students'} ? 'active' : ''">Students</a>
        <a class="nav-item" th:href="@{/app/admin/roles}"
           th:classappend="${active == 'roles'} ? 'active' : ''">Roles</a>
        <a class="nav-item" th:href="@{/app/profile}">My profile</a>
    </nav>

    <div class="spacer"></div>

    <form class="logout-form" th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit">Sign out</button>
    </form>
</aside>

</body>
</html>
