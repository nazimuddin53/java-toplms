<!DOCTYPE html>
<!--
  Welcome page template.

  xmlns:th declares the Thymeleaf namespace, which enables th:* attributes.
  Thymeleaf is a "natural template" engine: this file is still valid HTML and
  opens fine in a browser on its own — th:text values simply override the
  placeholder text when the page is rendered by the running app.

  HomeController puts "appName" and "tagline" into the Model; the th:text
  attributes below read them with ${...} expressions.
-->
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${appName} + ' — Welcome'">toplms — Welcome</title>
    <style>
        :root {
            --bg-from: #1e1b4b;
            --bg-to: #312e81;
            --accent: #818cf8;
            --accent-strong: #6366f1;
            --card: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.12);
            --text: #f8fafc;
            --text-muted: #c7d2fe;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
            background: radial-gradient(circle at 20% 20%, var(--bg-to), var(--bg-from));
        }

        .card {
            width: 100%;
            max-width: 560px;
            padding: 3rem 2.75rem;
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
            text-align: center;
        }

        .badge {
            display: inline-block;
            margin-bottom: 1.5rem;
            padding: 0.35rem 0.9rem;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
            background: rgba(129, 140, 248, 0.15);
            border: 1px solid rgba(129, 140, 248, 0.35);
            border-radius: 999px;
        }

        .logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            font-weight: 800;
            color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.5);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        h1 .name { color: var(--accent); }

        .tagline {
            font-size: 1.05rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .feature {
            padding: 1rem 0.5rem;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        .feature strong {
            display: block;
            margin-bottom: 0.25rem;
            font-size: 1.25rem;
        }

        .cta {
            display: inline-block;
            padding: 0.8rem 2rem;
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            border-radius: 10px;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(99, 102, 241, 0.5);
        }

        footer {
            margin-top: 2rem;
            font-size: 0.78rem;
            color: rgba(199, 210, 254, 0.6);
        }
    </style>
</head>
<body>
    <main class="card">
        <span class="badge">SaaS Platform</span>

        <div class="logo" th:text="${#strings.toUpperCase(#strings.substring(appName, 0, 1))}">T</div>

        <h1>
            Welcome to <span class="name" th:text="${appName}">toplms</span>
        </h1>
        <p class="tagline" th:text="${tagline}">Multi-tenant Learning Management System</p>

        <section class="features">
            <div class="feature">
                <strong>🏢</strong>
                Multi-tenant
            </div>
            <div class="feature">
                <strong>📚</strong>
                Courses &amp; Learning
            </div>
            <div class="feature">
                <strong>🤖</strong>
                AI Tutoring
            </div>
        </section>

        <a class="cta" href="#">Get Started</a>

        <footer>
            Built with Spring Boot &amp; Thymeleaf &middot; engine + app modular monolith
        </footer>
    </main>
</body>
</html>
